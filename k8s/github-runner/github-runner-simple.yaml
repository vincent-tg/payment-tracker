apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: payment-tracker-runner-simple
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      repository: vincent-tg/payment-tracker
      labels:
        - self-hosted
        - linux
        - arm64
        - k3s
      image: summerwind/actions-runner:latest
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          cpu: "1"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "1Gi"