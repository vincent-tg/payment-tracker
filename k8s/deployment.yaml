apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-tracker
  namespace: default
  labels:
    app: payment-tracker
    version: v1.0.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-tracker
  template:
    metadata:
      labels:
        app: payment-tracker
        version: v1.0.0
    spec:
      containers:
      - name: payment-tracker
        image: payment-tracker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: RUST_LOG
          value: "info"
        - name: DATABASE_PATH
          value: "/app/data/payments.db"
        - name: EMAIL_ADDRESS
          valueFrom:
            secretKeyRef:
              name: payment-tracker-secrets
              key: email-address
        - name: EMAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-tracker-secrets
              key: email-password
        - name: IMAP_SERVER
          value: "imap.gmail.com"
        - name: IMAP_PORT
          value: "993"
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - /app/payment-tracker
            - "--help"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /app/payment-tracker
            - "list"
            - "--limit"
            - "1"
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: payment-tracker-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: payment-tracker-service
  namespace: default
spec:
  selector:
    app: payment-tracker
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  type: ClusterIP